# Set default terminal for true color support
set -g default-terminal "xterm-256color"
set -ga terminal-features "xterm-256color:RGB"
# Fallback for older tmux versions (uncomment if tmux < 3.2)
# set -ga terminal-overrides "xterm-256color:Tc"

# Reduce escape time for Neovim
set-option -sg escape-time 10

# Enable focus events for Neovim
set-option -g focus-events on

# Set prefix to Ctrl-a
set -g prefix C-SPACE
# bind C-a send-prefix

# Start windows at 1, renumber automatically
set -g base-index 1
set -g renumber-windows on

# Use vi keybindings in copy mode
set -g mode-keys vi

# Status bar configuration
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"
set -g window-status-current-style "fg=blue bold"
set -g status-right ""
set -g status-left "#S"

# Reload config with Prefix+r
bind r source-file "~/.config/tmux/tmux.conf" \; display "Config reloaded!"

# Toggle status bar with Prefix+b
bind b set -g status
